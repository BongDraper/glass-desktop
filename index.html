<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Beilos OS | Glass Desktop</title>
    <style>
        /* This section is the "Design" (CSS) */
        body {
            background: linear-gradient(135deg, #0078d7 0%, #27c4f5 100%);
            height: 100vh;
            margin: 0;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            overflow: hidden; /* Keeps the "Desktop" from scrolling */
        }

        /* The Taskbar at the bottom */
        .taskbar {
            position: fixed;
            bottom: 0;
            width: 100%;
            height: 45px;
            background: rgba(255, 255, 255, 0.2); /* The "Glass" effect */
            backdrop-filter: blur(10px); /* Makes it blurry like Aero */
            border-top: 1px solid rgba(255, 255, 255, 0.3);
            display: flex;
            align-items: center;
            z-index: 1000;
        }

        /* The Start Button */
        .start-button {
            background: linear-gradient(to bottom, #3dbd3d 0%, #218521 100%);
            color: white;
            padding: 5px 20px;
            border-radius: 0 15px 15px 0; /* Rounded like the XP button */
            font-weight: bold;
            font-style: italic;
            cursor: pointer;
            box-shadow: 2px 0 5px rgba(0,0,0,0.2);
            border: 1px solid #1a631a;
            margin-right: 15px;
        }

        .start-button:hover {
            filter: brightness(1.1);
        }

        /* The Clock in the corner */
        .system-tray {
            margin-left: auto;
            padding-right: 15px;
            color: white;
            font-size: 14px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>

    <div class="taskbar">
        <div class="start-button" onclick="alert('Beilos OS: System Initialized')">START</div>
        <div style="color: white; opacity: 0.8;">| &nbsp; Project: Glass Desktop</div>
        
        <div class="system-tray" id="clock">12:00 PM</div>
    </div>

    <script>
        /* A tiny bit of "Logic" (JavaScript) to make the clock real */
        function updateClock() {
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
        }
        setInterval(updateClock, 1000);
        updateClock();
    </script>

</body>
</html>
