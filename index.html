<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bong OS | Desktop</title>
    <style>
        :root {
            --xp-blue: #245edb;
            --xp-orange: #ff8c00;
            --taskbar-height: 40px;
            --start-width: 380px;
        }

        * { box-sizing: border-box; user-select: none; }

        body, html {
            height: 100%; margin: 0; padding: 0;
            font-family: 'Tahoma', 'Segoe UI', sans-serif;
            overflow: hidden;
        }

        /* The Desktop Background */
        .desktop {
            height: 100vh; width: 100vw;
            background: url('%20-11.jpg') no-repeat center center fixed;
            background-size: cover;
            background-color: #0078d7;
            position: relative;
            z-index: 1;
        }

        /* --- START MENU STYLES --- */
        .start-menu {
            position: fixed;
            bottom: var(--taskbar-height);
            left: 0;
            width: var(--start-width);
            background: white;
            border-radius: 5px 5px 0 0;
            box-shadow: 2px -2px 10px rgba(0,0,0,0.3);
            display: none; /* Hidden by default */
            flex-direction: column;
            z-index: 10000;
            border: 1px solid #003096;
            overflow: hidden;
        }

        /* Blue Top Header */
        .start-header {
            background: linear-gradient(to bottom, #1159d2 0%, #3f8cf3 50%, #1159d2 100%);
            padding: 10px;
            display: flex;
            align-items: center;
            color: white;
            font-weight: bold;
            text-shadow: 1px 1px 1px rgba(0,0,0,0.5);
            border-bottom: 1px solid #003096;
        }

        .user-icon {
            width: 40px; height: 40px;
            background: #fff;
            border: 2px solid rgba(255,255,255,0.5);
            border-radius: 4px;
            margin-right: 10px;
            display: flex; align-items: center; justify-content: center;
            font-size: 24px;
        }

        /* The Two Columns */
        .start-columns {
            display: flex;
            height: 350px;
        }

        .start-left {
            flex: 1.2;
            background: white;
            padding: 10px 0;
        }

        .start-right {
            flex: 1;
            background: #dbeafe; /* Classic light blue-ish right side */
            border-left: 2px solid #91b0df;
            padding: 10px 0;
        }

        .menu-item {
            padding: 8px 15px;
            display: flex;
            align-items: center;
            font-size: 12px;
            cursor: pointer;
            color: #333;
        }

        .menu-item:hover {
            background: #316ac5;
            color: white;
        }

        .menu-item i { margin-right: 10px; font-size: 16px; }

        .start-footer {
            background: linear-gradient(to bottom, #1159d2 0%, #3f8cf3 100%);
            padding: 8px;
            display: flex;
            justify-content: flex-end;
            gap: 10px;
        }

        .footer-btn {
            background: none; border: none; color: white;
            font-size: 12px; cursor: pointer; display: flex; align-items: center;
        }

        /* --- REST OF OS STYLES --- */
        .taskbar {
            position: fixed; bottom: 0; left: 0; width: 100%;
            height: var(--taskbar-height);
            background: linear-gradient(to bottom, #245edb 0%, #3f8cf3 9%, #245edb 18%, #245edb 92%, #1941a5 100%);
            display: flex; align-items: center; z-index: 9999;
        }

        .start-btn {
            height: 100%;
            background: linear-gradient(to bottom, #3dbd3d 0%, #218521 100%);
            padding: 0 15px;
            display: flex; align-items: center;
            color: white; font-weight: bold; font-style: italic; font-size: 16px;
            border-radius: 0 10px 10px 0;
            border: none; cursor: pointer;
            box-shadow: 2px 0 5px rgba(0,0,0,0.3);
        }

        .start-btn:active { box-shadow: inset 2px 2px 5px rgba(0,0,0,0.5); }

        .system-tray {
            margin-left: auto;
            background: linear-gradient(to bottom, #0997ff 0%, #0053ee 100%);
            height: 100%; display: flex; align-items: center; padding: 0 15px;
            color: white; font-size: 12px; border-left: 1px solid #0840b3;
        }

        .icon-grid {
            position: absolute; top: 20px; left: 20px;
            display: flex; flex-direction: column; gap: 20px;
        }

        .desktop-icon { 
            width: 75px; 
            text-align: center; 
            cursor: pointer; 
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        .icon-display {
            width: 48px;
            height: 48px;
            font-size: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            background-size: contain;
            background-position: center;
            background-repeat: no-repeat;
            margin-bottom: 4px;
        }

        .icon-label {
            color: white; font-size: 11px; text-shadow: 1px 1px 2px black;
            padding: 2px; background: rgba(0,0,0,0.2); border-radius: 2px;
        }

        /* Simple Modal for Icon Selection */
        #iconSelectorModal {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: #ece9d8;
            border: 3px solid #0058e6;
            border-radius: 8px 8px 0 0;
            padding: 0;
            z-index: 20000;
            display: none;
            width: 300px;
            box-shadow: 5px 5px 20px rgba(0,0,0,0.5);
        }
        .modal-header {
            background: linear-gradient(to bottom, #0058e6 0%, #003db3 100%);
            padding: 5px 10px;
            color: white;
            font-weight: bold;
            font-size: 13px;
            display: flex; justify-content: space-between;
        }
        .modal-body { padding: 15px; background: white; margin: 2px; border: 1px solid #919b9c; }
        .modal-body select { width: 100%; padding: 5px; margin-bottom: 15px; }
        .modal-body button { padding: 5px 15px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="desktop" id="desktop">
        
        <div class="icon-grid" id="iconGrid">
            <div class="desktop-icon" id="icon-beilos" onclick="alert('Coffee Manager Opening...')">
                <div class="icon-display">☕</div>
                <div class="icon-label">Beilos.exe</div>
            </div>
            <!-- More projects can be added here -->
        </div>

        <!-- START MENU -->
        <div class="start-menu" id="startMenu">
            <div class="start-header">
                <div class="user-icon">👤</div>
                <span>Max G.</span>
            </div>
            <div class="start-columns">
                <div class="start-left">
                    <div class="menu-item" onclick="alert('Internet Explorer coming soon...')">🌐 Internet Explorer</div>
                    <div class="menu-item" onclick="alert('Email coming soon...')">📧 Outlook Express</div>
                    <hr style="border: 0; border-top: 1px solid #eee;">
                    <div class="menu-item">📝 Notepad</div>
                    <div class="menu-item">🎨 Paint</div>
                </div>
                <div class="start-right">
                    <div class="menu-item" style="font-weight: bold;">My Documents</div>
                    <div class="menu-item" style="font-weight: bold;">My Pictures</div>
                    <hr style="border: 0; border-top: 1px solid #91b0df; margin: 5px 10px;">
                    <div class="menu-item">Control Panel</div>
                    <!-- WALLPAPER SETTING -->
                    <div class="menu-item" onclick="triggerWallpaperUpload()" style="color: #003096;">🖼️ Change Wallpaper</div>
                    <!-- ICON SETTING -->
                    <div class="menu-item" onclick="openIconSelector()" style="color: #003096;">📁 Replace Icon</div>
                    <div class="menu-item">Help and Support</div>
                </div>
            </div>
            <div class="start-footer">
                <button class="footer-btn">🔑 Log Off</button>
                <button class="footer-btn">🔴 Turn Off</button>
            </div>
        </div>

    </div>

    <!-- ICON SELECTOR MODAL -->
    <div id="iconSelectorModal">
        <div class="modal-header">
            <span>Bong OS - Icon Manager</span>
            <span style="cursor:pointer" onclick="closeIconSelector()">X</span>
        </div>
        <div class="modal-body">
            <p style="font-size: 12px; margin-top: 0;">Select project to modify:</p>
            <select id="targetIconSelect">
                <option value="icon-beilos">Beilos.exe</option>
            </select>
            <button onclick="triggerIconUpload()">Upload Image...</button>
        </div>
    </div>

    <!-- Hidden Inputs -->
    <input type="file" id="wallpaperInput" style="display: none;" accept="image/*">
    <input type="file" id="iconInput" style="display: none;" accept="image/*">

    <div class="taskbar">
        <button class="start-btn" id="startBtn">start</button>
        <div class="system-tray">
            <span id="clock">12:00 PM</span>
        </div>
    </div>

    <script>
        const startBtn = document.getElementById('startBtn');
        const startMenu = document.getElementById('startMenu');
        const wallpaperInput = document.getElementById('wallpaperInput');
        const iconInput = document.getElementById('iconInput');
        const desktop = document.getElementById('desktop');
        const iconModal = document.getElementById('iconSelectorModal');
        const targetIconSelect = document.getElementById('targetIconSelect');

        // Toggle Start Menu
        startBtn.onclick = (e) => {
            e.stopPropagation();
            startMenu.style.display = startMenu.style.display === 'flex' ? 'none' : 'flex';
        };

        // Close menu if clicking desktop
        desktop.onclick = () => {
            startMenu.style.display = 'none';
            closeIconSelector();
        };

        // Wallpaper Upload Logic
        function triggerWallpaperUpload() {
            startMenu.style.display = 'none';
            wallpaperInput.click();
        }

        wallpaperInput.onchange = (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    desktop.style.backgroundImage = `url('${event.target.result}')`;
                };
                reader.readAsDataURL(file);
            }
        };

        // Icon Customization Logic
        function openIconSelector() {
            startMenu.style.display = 'none';
            iconModal.style.display = 'block';
        }

        function closeIconSelector() {
            iconModal.style.display = 'none';
        }

        function triggerIconUpload() {
            iconInput.click();
        }

        iconInput.onchange = (e) => {
            const file = e.target.files[0];
            const targetId = targetIconSelect.value;
            if (file && targetId) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    const iconElement = document.getElementById(targetId).querySelector('.icon-display');
                    // Remove text/emoji
                    iconElement.innerText = '';
                    // Set as background image
                    iconElement.style.backgroundImage = `url('${event.target.result}')`;
                    closeIconSelector();
                };
                reader.readAsDataURL(file);
            }
        };

        // Clock Logic
        function updateClock() {
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        }
        setInterval(updateClock, 1000);
        updateClock();
    </script>
</body>
</html>
